kind: Deployment
apiVersion: apps/v1
metadata:
  name: nginx
  labels:
    app: nginx
    tier: frontend
    purpose: deployment
  
spec:
  replicas: {{ .values.deployment.replicas }}
  selector:
    matchLabels:
      app: nginx
      tier: frontend
      purpose: deployment

  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
        purpose: deployment
    spec:
      containers:
      - name: frontend
        image: nginx: {{ .values.deployment.imageversion }}
        ports:
        - containerPort: 80